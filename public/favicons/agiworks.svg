<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AGI Works">
  <defs>
    <!-- Dunkler Tiefen-Untergrund (Navy ? Schwarz), damit der Akzent bei jeder UI sichtbar bleibt -->
    <radialGradient id="aw-bg" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0%"  stop-color="#0F1B33" />
      <stop offset="65%" stop-color="#070B17" />
      <stop offset="100%" stop-color="#03050C" />
    </radialGradient>

    <!-- Silberner Au�enring (Chrom-Effekt, schmal damit der Innenraum dominant bleibt) -->
    <linearGradient id="aw-ring" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#F4F7FB" />
      <stop offset="32%" stop-color="#C9D0DC" />
      <stop offset="58%" stop-color="#6E7484" />
      <stop offset="78%" stop-color="#9099A8" />
      <stop offset="100%" stop-color="#E2E6EE" />
    </linearGradient>

    <!-- Silber-Cyan A (heller als reines Silber ? bleibt bei 16�16 sichtbar) -->
    <linearGradient id="aw-letter" x1="32" y1="10" x2="32" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#FFFFFF" />
      <stop offset="45%" stop-color="#D6DEEA" />
      <stop offset="100%" stop-color="#8892A5" />
    </linearGradient>

    <!-- Blaue Swooshes (Marken-Identit�t � dominant, kontrastiert mit Silber) -->
    <linearGradient id="aw-swoosh" x1="10" y1="22" x2="54" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#4DA8FF" />
      <stop offset="50%" stop-color="#1F7AE0" />
      <stop offset="100%" stop-color="#0B4FBF" />
    </linearGradient>

    <!-- Sekund�rer hellerer Swoosh-Layer f�r Glanz -->
    <linearGradient id="aw-swoosh-hi" x1="10" y1="22" x2="54" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#9BD0FF" />
      <stop offset="100%" stop-color="#3088E8" />
    </linearGradient>

    <!-- Glas-Highlight oben (subtil) -->
    <radialGradient id="aw-shine" cx="0.5" cy="0.30" r="0.6">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.30" />
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Dunkler Hintergrund (Kreis) � sorgt f�r Tab-Kontrast in jedem Theme -->
  <circle cx="32" cy="32" r="31" fill="url(#aw-bg)" />

  <!-- Glas-Reflexion oben -->
  <circle cx="32" cy="32" r="29" fill="url(#aw-shine)" />

  <!-- Silberner Au�enring (Chrom) -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#aw-ring)" stroke-width="2" />
  <!-- Schwarzer Akzentring innerhalb (Tiefen-Effekt) -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#03050C" stroke-width="0.6" opacity="0.85" />

  <!--
    Das "A" � geometrisch + scharf, Outline+Steg-Variante des Original-Logos.
    Bewusst breiter & heller als das Original, damit es bei 16�16 lesbar bleibt.
  -->
  <path
    d="M 32 12
       L 49 51
       L 42.3 51
       L 39.0 43.4
       L 25.0 43.4
       L 21.7 51
       L 15 51 Z
       M 27.3 37.0
       L 36.7 37.0
       L 32 25.6 Z"
    fill="url(#aw-letter)"
    stroke="#FFFFFF"
    stroke-width="0.5"
    stroke-linejoin="round"
    opacity="0.96"
  />

  <!--
    Dominanter blauer Haupt-Swoosh � Marken-DNA.
    Bewusst kr�ftig & sichtbar � das ist das einzige Element, das AGI Works auch bei 16�16 sofort erkennbar macht.
  -->
  <path
    d="M 11 33.5
       C 18 26.0, 27 22.8, 35 23.8
       C 41.5 24.5, 47 28.0, 51 33.0
       L 44.5 33.0
       C 41.5 30.0, 37.8 28.5, 33.6 28.4
       C 27.0 28.2, 21.6 30.8, 17.6 35.0 Z"
    fill="url(#aw-swoosh)"
  />

  <!-- Heller Glanz-Strich oben auf dem Swoosh (Marken-Sheen) -->
  <path
    d="M 14 31.4
       C 20 26.6, 28 24.4, 35 25.0
       L 35 26.6
       C 28.4 26.0, 21.6 28.0, 16.6 32.0 Z"
    fill="url(#aw-swoosh-hi)"
    opacity="0.7"
  />

  <!-- Sekund�rer schmaler Swoosh-Akzent darunter -->
  <path
    d="M 17.2 39.0
       C 22.4 37.2, 28.6 36.6, 34.4 37.4
       C 37.6 37.9, 40.6 38.9, 43.0 40.2
       L 39.4 40.2
       C 36.8 39.4, 34.0 39.0, 31.2 39.0
       C 26.4 39.0, 21.8 40.0, 18.6 41.0 Z"
    fill="url(#aw-swoosh)"
    opacity="0.78"
  />
</svg>
